name: voice-agent image

# Validate (and, on main, publish) the voice agent container image.
on:
  push:
    branches: ["**"]
    paths:
      - "voice-agent/**"
      - "gainesville-no-website/gainesville_no_website.json"
      - ".github/workflows/voice-agent-image.yml"
  pull_request:
    paths:
      - "voice-agent/**"
      - "gainesville-no-website/gainesville_no_website.json"
      - ".github/workflows/voice-agent-image.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-voice-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      # Publishing only happens on a real push to the default branch; PRs and
      # feature branches build for validation without pushing.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          # Repo root so the fallback business JSON is in the build context.
          context: .
          file: voice-agent/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
